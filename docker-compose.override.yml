services:
# ----------------- Databases ------------------
  catalogdb:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: CatalogDb
    volumes:
      - postgres_catalog:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d CatalogDb"]
      interval: 10s
      timeout: 5s
      retries: 5

  basketdb:
    container_name: basketdb
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=BasketDb
    restart: always
    ports:
      - "5433:5432"
    volumes:
      - postgres_basket:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d BasketDb"]
      interval: 10s
      timeout: 5s
      retries: 5

  orderdb:
    container_name: orderdb
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQLSERVER_SA_PASSWORD}
    restart: always
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  usersdb:
    container_name: usersdb
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=UsersDb
    restart: always
    ports:
      - "5434:5432"
    volumes:
      - postgres_users:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d UsersDb"]
      interval: 10s
      timeout: 5s
      retries: 5

  paymentdb:
    container_name: paymentdb
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=PaymentDb
    restart: always
    ports:
      - "5435:5432"
    volumes:
      - postgres_payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PaymentDb"]
      interval: 10s
      timeout: 5s
      retries: 5

  distributedcache:
    container_name: distributedcache
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
    restart: always
    ports:
      - "5341:5341"   # ingestion
      - "8081:80"     # UI

  otel-dashboard:
    container_name: otel-dashboard
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true   # dev only: no login token
    restart: always
    ports:
      - "18888:18888"   # UI (traces/metrics/logs)
      - "18889:18889"   # OTLP gRPC ingestion

  keycloak:
    container_name: keycloak
    command: start-dev --import-realm                     # dev: in-memory, no TLS; imports the eshop realm
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    restart: always
    ports:
      - "8088:8080"                                       # admin console + OIDC issuer (host)

# ---------------- Services ---------------------
  catalogapi:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__PostgreDataBase=Server=catalogdb;Port=5432;Database=CatalogDb;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true
      - Jwt__Authority=http://keycloak:8080/realms/eshop
      - Seq__ServerUrl=http://seq:5341
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-dashboard:18889
    depends_on:
      catalogdb:
        condition: service_healthy
    ports:
      - "6000:8080"
      - "6060:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  basketapi:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__PostgreDataBase=Server=basketdb;Port=5432;Database=BasketDb;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true
      - ConnectionStrings__Redis=distributedcache:6379
      - GrpcSettings__DiscountUrl=https://discountgrpc:8081
      - MessageBroker__Host=amqp://ecommerce-mq:5672
      - MessageBroker__UserName=${RABBITMQ_USER}
      - MessageBroker__Password=${RABBITMQ_PASS}
      - Jwt__Authority=http://keycloak:8080/realms/eshop
      - Seq__ServerUrl=http://seq:5341
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-dashboard:18889
    depends_on:
      basketdb:
        condition: service_healthy
      distributedcache:
        condition: service_healthy
      discountgrpc:
        condition: service_started
      messagebroker:
        condition: service_healthy
    ports:
      - "6001:8080"
      - "6061:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  discountgrpc:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__Database=Data Source=discountdb
      - Seq__ServerUrl=http://seq:5341
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-dashboard:18889
    ports:
      - "6002:8080"
      - "6062:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  messagebroker:
    container_name: messagebroker
    hostname: ecommerce-mq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  order.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__Database=Server=orderdb;Database=OrderDb;User Id=sa;Password=${SQLSERVER_SA_PASSWORD};Encrypt=False;TrustServerCertificate=True
      - MessageBroker__Host=amqp://ecommerce-mq:5672
      - MessageBroker__UserName=${RABBITMQ_USER}
      - MessageBroker__Password=${RABBITMQ_PASS}
      - FeatureManagement__OrderFulfillment=false
      - Jwt__Authority=http://keycloak:8080/realms/eshop
      - Seq__ServerUrl=http://seq:5341
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-dashboard:18889
    depends_on:
      orderdb:
        condition: service_healthy
      messagebroker:
        condition: service_healthy
    ports:
      - "6003:8080"
      - "6063:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  usersapi:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__PostgreDataBase=Server=usersdb;Port=5432;Database=UsersDb;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true
      - Jwt__Authority=http://keycloak:8080/realms/eshop
      - Seq__ServerUrl=http://seq:5341
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-dashboard:18889
    depends_on:
      usersdb:
        condition: service_healthy
    ports:
      - "6004:8080"
      - "6064:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  paymentapi:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__PostgreDataBase=Server=paymentdb;Port=5432;Database=PaymentDb;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true
      - MessageBroker__Host=amqp://ecommerce-mq:5672
      - MessageBroker__UserName=${RABBITMQ_USER}
      - MessageBroker__Password=${RABBITMQ_PASS}
      - Seq__ServerUrl=http://seq:5341
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-dashboard:18889
    depends_on:
      paymentdb:
        condition: service_healthy
      messagebroker:
        condition: service_healthy
    ports:
      - "6005:8080"
      - "6065:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  yarpapigateway:
    container_name: yarpapigateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      # Container-network destinations override the localhost values in appsettings (host dev).
      - ReverseProxy__Clusters__catalog-cluster__Destinations__destination1__Address=http://catalogapi:8080/
      - ReverseProxy__Clusters__basket-cluster__Destinations__destination1__Address=http://basketapi:8080/
      - ReverseProxy__Clusters__ordering-cluster__Destinations__destination1__Address=http://order.api:8080/
      - ReverseProxy__Clusters__users-cluster__Destinations__destination1__Address=http://usersapi:8080/
      - Jwt__Authority=http://keycloak:8080/realms/eshop
      - Seq__ServerUrl=http://seq:5341
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-dashboard:18889
    depends_on:
      - catalogapi
      - basketapi
      - order.api
      - usersapi
    ports:
      - "5004:8080"
