syntax = "proto3";

option csharp_namespace = "DiscountGrpc.Protos";

package discount;
import "google/protobuf/empty.proto";

// DiscountProtoService defines the gRPC service for managing discounts (coupons).
service DiscountProtoService {
	rpc GetDiscount (GetDiscountRequest) returns (CouponModel);
	rpc CreateDiscount (CreateDiscountRequest) returns (CouponModel);
	rpc UpdateDiscount (UpdateDiscountRequest) returns (CouponModel);
	rpc DeleteDiscount (DeleteDiscountRequest) returns (DeleteDiscountResponse);
	rpc GetAllDiscounts (google.protobuf.Empty) returns (GetAllDiscountsResponse);
}
/*
bos bir fonksiyon icin 
rpc GetDiscount () returns (CouponModel);
once import olarak bos proto eklenip sonra parametre gecilmeli.
import "google/protobuf/empty.proto";
rpc GetDiscount (google.protobuf.Empty) returns (CouponModel);
*/
message GetDiscountRequest {
	string productName = 1;
}

message CouponModel {
	int32 id = 1;
	string productName = 2;
	string description = 3;
	int32 amount = 4;
}
/*
birden fazla ururn dondurmek icin repeated kullanilir.
message ProductListResponse {
    repeated ProductModel Products = 1;
}
*/
message CreateDiscountRequest {
	CouponModel coupon = 1;
}

message UpdateDiscountRequest {
	CouponModel coupon = 1;
}

message DeleteDiscountRequest {
	string productName = 1;
}

message DeleteDiscountResponse {
	bool success = 1;
}

message GetAllDiscountsResponse{
	// repeated kullanarak birden fazla coupon dondurebiliriz.
	repeated CouponModel coupons = 1;
}

